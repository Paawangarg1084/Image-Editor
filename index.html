<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Editor</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>

  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<section>

  <!-- LEFT PANEL: FILTERS SIDEBAR -->
  <div class="left">
    <h2>Filters</h2>
    <div id="filters"></div>

    <!-- PRESET AESTHETICS PANEL -->
    <div class="presets-panel" style="margin-top: var(--space-lg); padding-top: var(--space-md); border-top: 1px solid rgba(255, 30, 30, 0.15);">
      <h3 style="font-size: 14px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: var(--space-sm); font-family: 'Orbitron', sans-serif; letter-spacing: 0.5px;">Aesthetic Presets</h3>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-sm);">
        <button id="preset-cyberpunk" class="btn" style="padding: 6px; font-size: 11px; justify-content: center;">Cyberpunk</button>
        <button id="preset-vintage" class="btn" style="padding: 6px; font-size: 11px; justify-content: center;">Vintage</button>
        <button id="preset-noir" class="btn" style="padding: 6px; font-size: 11px; justify-content: center;">Noir</button>
        <button id="preset-crimson" class="btn" style="padding: 6px; font-size: 11px; justify-content: center;">Crimson</button>
      </div>
    </div>

    <p class="signature">Project By Paawan Garg</p>
  </div>

  <!-- RIGHT PANEL: WORKSPACE -->
  <div class="right">
    
    <!-- TOP TOOLBAR: ACTIONS -->
    <div class="top">
      <label class="btn">
        Choose File
        <input type="file" id="img-input" accept="image/*" hidden>
      </label>

      <!-- <button id="remove-bg-btn" class="btn">Remove Background</button> -->
      <button id="reset-image-btn" class="btn">Reset Image</button>
      <button id="crop-btn" class="btn">Crop</button>
      <button id="apply-crop-btn" class="btn">Apply Crop</button>

      <!-- TRANSFORMATION BUTTONS -->
      <button id="mirror-h-btn" class="btn">
        <i class="ri-flip-horizontal-line" style="font-size:14px; position:static; margin-right:4px;"></i> Mirror Horizontal
      </button>
      <button id="mirror-v-btn" class="btn">
        <i class="ri-flip-vertical-line" style="font-size:14px; position:static; margin-right:4px;"></i> Mirror Vertical
      </button>
      
      <!-- ROTATE BUTTON -->
      <button id="rotate-btn" class="btn">
        <i class="ri-clockwise-line" style="font-size:14px; position:static; margin-right:4px;"></i> Rotate 90°
      </button>

      <!-- SAFE UTILITIES TOOLBAR -->
      <button id="eyedropper-btn" class="btn">
        <i class="ri-contrast-drop-2-line" style="font-size:14px; position:static; margin-right:4px;"></i> Pick Color
      </button>

      <div class="watermark-group" style="display: inline-flex; align-items: center; gap: var(--space-sm); background: var(--bg-card); padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid rgba(255, 30, 30, 0.2);">
        <input type="text" id="watermark-input" placeholder="Text banner..." style="background: transparent; border: none; color: #fff; outline: none; font-size: 13px; width: 100px;">
        <input type="color" id="watermark-color" value="#ff1e1e" style="border: none; background: transparent; cursor: pointer; width: 24px; height: 24px;">
        <button id="apply-watermark-btn" class="btn" style="padding: 6px 10px; margin: 0;">Add Text</button>
      </div>

      <button id="download-btn" class="btn">Download</button>
    </div>

    <!-- BOTTOM STUDIO: IMAGE CANVAS -->
    <div class="bottom">
      <div class="canvas-container">
        <img id="image" alt="Editor Workspace Target" />

        <div id="crop-box">
          <div class="resize handle-tl"></div>
          <div class="resize handle-br"></div>
        </div>
      </div>

      <!-- CENTRAL NOTIFICATION DEFAULT VIEWPORT -->
      <i class="ri-image-fill"></i>
      <p class="p">No Chosen Image</p>
    </div>

  </div>

</section>

<!-- INVISIBLE SVG FILTER FOR HIGH-PRECISION SHARPNESS PROCESSING -->
<svg xmlns="http://w3.org" style="display: none;">
  <filter id="svg-sharpen">
    <feConvolveMatrix id="sharpen-matrix" order="3" preserveAlpha="true" kernelMatrix="0 0 0 0 1 0 0 0 0"/>
  </filter>
</svg>

<script src="script.js"></script>
</body>
</html>
